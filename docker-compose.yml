services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GATEWAY_SECRET_TOKEN: ${GATEWAY_SECRET_TOKEN}
      SECRET_KEY: ${SECRET_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-10}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.65}
      DASHBOARD_TITLE: ${DASHBOARD_TITLE:-Ops Incident Monitor}
      OPENWA_URL: ${OPENWA_URL:-http://openwa:2785}
      OPENWA_SESSION: ${OPENWA_SESSION:-opsgateway}
      OPENWA_API_KEY: ${OPENWA_API_KEY:-}
      SUMMARY_TIMEZONE: ${SUMMARY_TIMEZONE:-Africa/Nairobi}
      SUMMARY_SCHEDULE_HOUR: ${SUMMARY_SCHEDULE_HOUR:-8}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:8000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      BILLING_SERVICE_URL: ${BILLING_SERVICE_URL:-}
      BILLING_WEBHOOK_SECRET: ${BILLING_WEBHOOK_SECRET:-}
    networks:
      ops-net:
        # Dotted alias so the openwa webhook URL (which rejects bare,
        # non-dotted hostnames as invalid) can target this container by a
        # stable name instead of its IP, which changes on every recreate.
        aliases:
          - backend.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  openwa:
    build:
      context: ./openwa
    ports:
      - "2785:2785"
      - "2886:2886"
    volumes:
      - openwa_data:/app/data
    networks:
      - ops-net
    depends_on:
      - backend

networks:
  ops-net:
    driver: bridge

volumes:
  postgres_data:
  openwa_data:
  media_data:
