# Extract subdomain for billing auth checks
map $host $billing_subdomain {
    ~^(?P<sub>[^.]+)\.whats2eat\.com$  $sub;
    default                             "";
}

# Per-client server block template — copy/customize for each client subdomain
server {
    listen 443 ssl;
    server_name ~^(?P<sub>[^.]+)\.whats2eat\.com$;

    # ... existing SSL config ...

    # Gate all dashboard requests through billing service
    location / {
        auth_request /internal_billing_check;
        error_page 403 = @subscription_expired;
        proxy_pass http://127.0.0.1:PORT;  # replace PORT with this client's backend port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Internal sub-request to billing service auth-check endpoint
    location = /internal_billing_check {
        internal;
        proxy_pass http://127.0.0.1:9000/internal/auth-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Client-Subdomain $billing_subdomain;
    }

    # Redirect expired clients to the billing payment page
    location @subscription_expired {
        return 302 http://127.0.0.1:9000/payment-expired;
    }

    # Allow MPesa callback through without auth gate
    location /billing/webhook/mpesa {
        proxy_pass http://127.0.0.1:9000/webhook/mpesa;
    }
}
