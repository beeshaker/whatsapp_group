# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name *.whats2eat.com whats2eat.com;
    return 301 https://$host$request_uri;
}

# HTTPS — route each subdomain to its client backend
server {
    listen 443 ssl;
    server_name ~^(?<client>[^.]+)\.whats2eat\.com$;

    ssl_certificate     /etc/letsencrypt/live/whats2eat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whats2eat.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        auth_request      /internal_billing_check;
        error_page 403  = @subscription_expired;

        proxy_pass        http://host.docker.internal:$backend_port;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Billing subscription gate
    location = /internal_billing_check {
        internal;
        proxy_pass              http://billing:9000/internal/auth-check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Client-Subdomain $client;
    }

    location @subscription_expired {
        return 302 https://billing.whats2eat.com/payment-expired;
    }

    # MPesa callback bypasses auth gate
    location /billing/webhook/mpesa {
        proxy_pass http://billing:9000/webhook/mpesa;
    }
}

# Billing dashboard itself
server {
    listen 443 ssl;
    server_name billing.whats2eat.com;

    ssl_certificate     /etc/letsencrypt/live/whats2eat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whats2eat.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass        http://billing:9000;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }
}
