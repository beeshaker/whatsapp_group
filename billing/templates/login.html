<!DOCTYPE html>
<html>
<head><title>Billing Admin Login</title>
<style>
body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f4f4f4}
form{background:white;padding:2rem;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.12);min-width:320px}
h2{margin-top:0}
label{display:block;font-size:.9rem;font-weight:bold;margin-top:.8rem}
input{width:100%;box-sizing:border-box;padding:.5rem;margin:.3rem 0 1rem;border:1px solid #ccc;border-radius:4px}
button{width:100%;padding:.6rem;background:#25d366;color:white;border:none;border-radius:4px;cursor:pointer;font-size:1rem}
.error{color:#c00;font-size:.9rem}
</style>
</head>
<body>
<form method="post" action="/login">
  <h2>Billing Admin</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <label>Username</label>
  <input name="username" type="text" required autofocus>
  <label>Password</label>
  <input name="password" type="password" required>
  <button type="submit">Log in</button>
</form>
</body>
</html>
