<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Members — Ops Ticketing</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-soft: #0b1728;
      --surface: #101f34;
      --surface-2: #132840;
      --surface-3: #18324f;
      --line: rgba(148, 163, 184, 0.18);
      --text: #eef6ff;
      --muted: #91a3b8;
      --muted-2: #65758a;
      --blue: #38bdf8;
      --blue-deep: #075985;
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, 0.14);
      --green: #22c55e;
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(168, 85, 247, 0.14), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button, input { font: inherit; }

    /* ── Nav ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7, 17, 31, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1.5rem;
      height: 52px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 0.9375rem;
      letter-spacing: -0.01em;
      flex-shrink: 0;
    }

    .nav-brand-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--blue) 0%, #7c3aed 100%);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex: 1;
      justify-content: center;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.375rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s, background 0.15s;
    }

    .nav-link:hover { color: var(--text); background: rgba(148, 163, 184, 0.08); }
    .nav-link.active { color: var(--blue); background: rgba(56, 189, 248, 0.1); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.65rem;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 99px;
      font-size: 0.8125rem;
      font-weight: 500;
    }

    .user-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue) 0%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .btn-signout {
      padding: 0.35rem 0.875rem;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-signout:hover { color: var(--red); border-color: rgba(239, 68, 68, 0.4); }

    /* ── Page content ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      background: var(--blue);
      color: #0a1628;
      font-weight: 700;
      font-size: 0.875rem;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .btn-add:hover { opacity: 0.88; }

    /* ── Add user form ── */
    .add-form-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .add-form-wrap.open { display: block; }

    .add-form-wrap h3 {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .form-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
      min-width: 160px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="password"] {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      color: var(--text);
      padding: 0.55rem 0.75rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .btn-create {
      padding: 0.55rem 1.125rem;
      background: var(--blue);
      color: #0a1628;
      font-weight: 700;
      font-size: 0.875rem;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
      align-self: flex-end;
    }

    .btn-create:hover { opacity: 0.88; }

    .form-error {
      font-size: 0.8125rem;
      color: #fca5a5;
      margin-top: 0.75rem;
      display: none;
    }

    .form-error.visible { display: block; }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    tbody tr {
      border-bottom: 1px solid var(--line);
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(148, 163, 184, 0.04); }

    td {
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      vertical-align: middle;
    }

    .user-cell {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .username { font-weight: 600; }
    .you-badge {
      font-size: 0.7rem;
      color: var(--blue);
      background: rgba(56, 189, 248, 0.12);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      margin-left: 0.4rem;
      font-weight: 600;
    }

    .muted { color: var(--muted); }

    .btn-remove {
      padding: 0.35rem 0.75rem;
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-remove:hover:not(:disabled) { background: var(--red-soft); }

    .btn-remove:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .empty-state {
      padding: 3rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 0.75rem 1.125rem;
      font-size: 0.875rem;
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 9999;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: rgba(239, 68, 68, 0.5); color: #fca5a5; }

    /* Role badge */
    .role-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .role-badge-admin { background: rgba(56, 189, 248, 0.14); color: #38bdf8; }
    .role-badge-user  { background: rgba(148, 163, 184, 0.12); color: #91a3b8; }

    /* Edit Groups button */
    .btn-edit-groups {
      padding: 0.3rem 0.65rem;
      background: transparent;
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: var(--radius-sm);
      color: #7dd3fc;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-right: 0.4rem;
    }
    .btn-edit-groups:hover { background: rgba(56, 189, 248, 0.1); }

    /* Groups modal */
    .groups-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }
    .groups-modal-overlay.open { display: flex; }
    .groups-modal {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      width: 100%;
      max-width: 440px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .groups-modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .group-check-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
    .group-check-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; cursor: pointer; }
    .groups-modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .btn-save-groups {
      padding: 0.45rem 1rem;
      background: var(--blue);
      color: #0a1628;
      font-weight: 700;
      font-size: 0.875rem;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
    }
    .btn-cancel-groups {
      padding: 0.45rem 1rem;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.875rem;
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    /* Role selector in create form */
    select.field-select {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      color: var(--text);
      padding: 0.55rem 0.75rem;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
    }
    /* Group checklist in create form */
    #create-group-section { margin-top: 1rem; }
    #create-group-section label.section-label {
      font-size: 0.75rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      display: block; margin-bottom: 0.5rem;
    }
    #create-group-list { display: flex; flex-direction: column; gap: 0.4rem; }
  </style>
</head>
<body>

<!-- ── Nav ── -->
<nav class="nav">
  <a class="nav-brand" href="/">
    <div class="nav-brand-icon">🎫</div>
    Ops Ticketing
  </a>
  <div class="nav-links">
    <a class="nav-link" href="/">📋 Live Queue</a>
    <a class="nav-link" href="/archive">📁 Archive</a>
    <a class="nav-link active" href="/users">👥 Users</a>
    {% if role == 'admin' %}
    <a class="nav-link" href="/summaries">📊 Summaries</a>
    <a class="nav-link" href="/admin/profile">👤 Profile</a>
    {% endif %}
  </div>
  <div class="nav-right">
    <div class="user-pill">
      <div class="user-avatar" id="nav-avatar"></div>
      <span id="nav-username">{{ username }}</span>
    </div>
    <form method="post" action="/logout" style="margin:0">
      <button class="btn-signout" type="submit">Sign out</button>
    </form>
  </div>
</nav>

<!-- ── Page ── -->
<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Team Members</div>
      <div class="page-subtitle" id="member-count">Loading…</div>
    </div>
    <button class="btn-add" id="btn-add-user" onclick="toggleAddForm()">+ Add user</button>
  </div>

  <!-- Add user form -->
  <div class="add-form-wrap" id="add-form">
    <h3>New team member</h3>
    <div class="form-row">
      <div class="field">
        <label for="new-username">Username</label>
        <input id="new-username" type="text" placeholder="e.g. alice" autocomplete="off">
      </div>
      <div class="field">
        <label for="new-password">Password</label>
        <input id="new-password" type="password" placeholder="Min. 8 characters">
      </div>
      <div class="field" style="min-width:120px;max-width:140px">
        <label for="new-role">Role</label>
        <select id="new-role" class="field-select" onchange="onRoleChange()">
          <option value="user">user</option>
          <option value="admin">admin</option>
        </select>
      </div>
      <button class="btn-create" onclick="createUser()">Create user</button>
    </div>
    <div id="create-group-section">
      <label class="section-label">Assign Groups</label>
      <div id="create-group-list"><span style="color:var(--muted-2);font-size:0.8rem">Loading groups…</span></div>
    </div>
    <div class="form-error" id="form-error"></div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Member</th>
          <th>Role</th>
          <th>Groups</th>
          <th>Joined</th>
          <th>Added by</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="user-tbody">
        <tr><td colspan="6" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Groups modal -->
<div class="groups-modal-overlay" id="groups-modal-overlay" onclick="if(event.target===this)closeGroupsModal()">
  <div class="groups-modal">
    <h3 id="groups-modal-title">Edit Groups</h3>
    <div class="group-check-list" id="groups-modal-list"></div>
    <div class="groups-modal-actions">
      <button class="btn-cancel-groups" onclick="closeGroupsModal()">Cancel</button>
      <button class="btn-save-groups" onclick="saveGroups()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const CURRENT_USER = {{ username | tojson }};
  const AVATAR_COLORS = [
    "#0ea5e9","#7c3aed","#22c55e","#f59e0b","#ef4444","#ec4899","#14b8a6"
  ];

  function avatarColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
    return AVATAR_COLORS[h % AVATAR_COLORS.length];
  }

  function initials(name) {
    return name.slice(0, 2).toUpperCase();
  }

  // Set nav avatar
  const navAvatar = document.getElementById("nav-avatar");
  navAvatar.textContent = initials(CURRENT_USER);
  navAvatar.style.background = avatarColor(CURRENT_USER);

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  }

  let _users = [];

  async function loadUsers() {
    const res = await fetch("/users");
    if (!res.ok) return;
    _users = await res.json();
    renderTable();
    document.getElementById("member-count").textContent =
      _users.length === 1 ? "1 member" : `${_users.length} members`;
  }

  function renderTable() {
    const tbody = document.getElementById("user-tbody");
    if (_users.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No team members yet.</td></tr>`;
      return;
    }
    tbody.innerHTML = _users.map(u => {
      const isSelf = u.username === CURRENT_USER;
      const color = avatarColor(u.username);
      const roleBadgeClass = u.role === 'admin' ? 'role-badge-admin' : 'role-badge-user';
      const groupsDisplay = u.role === 'admin'
        ? '<em style="color:var(--muted-2)">All groups</em>'
        : (u.group_ids && u.group_ids.length > 0
            ? u.group_ids.map(gid => {
                const g = _allGroups.find(ag => ag.group_id === gid);
                return escHtml(g ? g.property_name : gid);
              }).join(', ')
            : '<span style="color:var(--muted-2)">—</span>');
      return `
        <tr>
          <td>
            <div class="user-cell">
              <div class="avatar" style="background:${color}">${initials(u.username)}</div>
              <span class="username">${escHtml(u.username)}${isSelf ? '<span class="you-badge">you</span>' : ""}</span>
            </div>
          </td>
          <td><span class="role-badge ${roleBadgeClass}">${escHtml(u.role)}</span></td>
          <td style="font-size:0.8125rem;color:var(--muted)">${groupsDisplay}</td>
          <td class="muted">${fmtDate(u.created_at)}</td>
          <td class="muted">${u.created_by ? escHtml(u.created_by) : "—"}</td>
          <td style="display:flex;gap:0.4rem;align-items:center">
            ${u.role === 'user' ? `<button class="btn-edit-groups" onclick="openGroupsModal(${u.id}, ${JSON.stringify(u.username)})">Edit Groups</button>` : ''}
            <button
              class="btn-remove"
              ${isSelf ? "disabled title=\"Cannot remove your own account\"" : ""}
              onclick="removeUser(${u.id}, ${JSON.stringify(u.username)})"
            >Remove</button>
          </td>
        </tr>`;
    }).join("");
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function toggleAddForm() {
    const form = document.getElementById("add-form");
    const isOpen = form.classList.toggle("open");
    document.getElementById("btn-add-user").textContent = isOpen ? "✕ Cancel" : "+ Add user";
    if (isOpen) document.getElementById("new-username").focus();
  }

  async function createUser() {
    const username = document.getElementById("new-username").value.trim();
    const password = document.getElementById("new-password").value;
    const role = document.getElementById("new-role").value;
    const errEl = document.getElementById("form-error");
    errEl.classList.remove("visible");

    if (!username) { showFormError("Username is required."); return; }
    if (password.length < 8) { showFormError("Password must be at least 8 characters."); return; }

    const groupIds = role === "user"
      ? [...document.querySelectorAll('#create-group-list input[type="checkbox"]:checked')].map(cb => cb.value)
      : [];

    const res = await fetch("/users", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password, role, group_ids: groupIds }),
    });

    if (res.ok) {
      document.getElementById("new-username").value = "";
      document.getElementById("new-password").value = "";
      document.getElementById("new-role").value = "user";
      onRoleChange();
      toggleAddForm();
      await loadUsers();
      showToast(`User "${username}" created.`);
    } else {
      const data = await res.json().catch(() => ({}));
      showFormError(data.detail || `Error ${res.status}`);
    }
  }

  function showFormError(msg) {
    const el = document.getElementById("form-error");
    el.textContent = msg;
    el.classList.add("visible");
  }

  async function removeUser(id, name) {
    if (!confirm(`Remove user "${name}"? This cannot be undone.`)) return;
    const res = await fetch(`/users/${id}/delete`, { method: "POST" });
    if (res.ok) {
      await loadUsers();
      showToast(`User "${name}" removed.`);
    } else {
      const data = await res.json().catch(() => ({}));
      showToast(data.detail || `Error ${res.status}`, true);
    }
  }

  function onRoleChange() {
    const role = document.getElementById("new-role").value;
    document.getElementById("create-group-section").style.display = role === "user" ? "block" : "none";
  }

  let _allGroups = [];

  async function loadAllGroups() {
    try {
      const res = await fetch("/api/groups");
      if (!res.ok) return;
      _allGroups = await res.json();
    } catch(e) {}
    renderCreateGroupChecklist();
  }

  function renderCreateGroupChecklist() {
    const container = document.getElementById("create-group-list");
    if (!container) return;
    if (_allGroups.length === 0) {
      container.innerHTML = '<span style="color:var(--muted-2);font-size:0.8rem">No groups discovered yet.</span>';
      return;
    }
    container.innerHTML = _allGroups.map(g => `
      <label class="group-check-item">
        <input type="checkbox" value="${escHtml(g.group_id)}">
        ${escHtml(g.property_name)}
      </label>
    `).join("");
  }

  let _editGroupsUserId = null;

  async function openGroupsModal(userId, username) {
    _editGroupsUserId = userId;
    document.getElementById("groups-modal-title").textContent = `Edit Groups — ${username}`;
    document.getElementById("groups-modal-list").innerHTML = '<span style="color:var(--muted-2);font-size:0.8rem">Loading…</span>';
    document.getElementById("groups-modal-overlay").classList.add("open");

    try {
      const [allGroups, userGroupIds] = await Promise.all([
        _allGroups.length > 0 ? Promise.resolve(_allGroups) : fetch("/api/groups").then(r => r.json()),
        fetch(`/users/${userId}/groups`).then(r => r.json()),
      ]);
      if (_allGroups.length === 0) _allGroups = allGroups;
      const assigned = new Set(userGroupIds);
      if (allGroups.length === 0) {
        document.getElementById("groups-modal-list").innerHTML = '<span style="color:var(--muted-2);font-size:0.8rem">No groups discovered yet.</span>';
        return;
      }
      document.getElementById("groups-modal-list").innerHTML = allGroups.map(g => `
        <label class="group-check-item">
          <input type="checkbox" value="${escHtml(g.group_id)}" ${assigned.has(g.group_id) ? "checked" : ""}>
          ${escHtml(g.property_name)}
        </label>
      `).join("");
    } catch(e) {
      document.getElementById("groups-modal-list").innerHTML = '<span style="color:var(--red)">Failed to load groups.</span>';
    }
  }

  function closeGroupsModal() {
    document.getElementById("groups-modal-overlay").classList.remove("open");
    _editGroupsUserId = null;
  }

  async function saveGroups() {
    if (!_editGroupsUserId) return;
    const checked = [...document.querySelectorAll("#groups-modal-list input:checked")].map(cb => cb.value);
    try {
      const res = await fetch(`/users/${_editGroupsUserId}/groups`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ group_ids: checked }),
      });
      if (!res.ok) throw new Error();
      closeGroupsModal();
      await loadUsers();
      showToast("Groups updated.");
    } catch(e) {
      showToast("Failed to save groups.", true);
    }
  }

  let _toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.toggle("error", isError);
    t.classList.add("show");
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
  }

  // Enter key in form fields
  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && document.getElementById("add-form").classList.contains("open")) {
      const active = document.activeElement;
      if (active.id === "new-username" || active.id === "new-password") createUser();
    }
  });

  loadAllGroups().then(() => loadUsers());
</script>

</body>
