<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    .page { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem; }

    h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: 1.75rem; }

    .status-row { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.25rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.disconnected { background: var(--red); }
    .status-dot.loading { background: var(--amber); }
    .status-label { font-size: .9rem; font-weight: 700; }
    .status-sub { font-size: .8rem; color: var(--muted); }

    .qr-area { text-align: center; padding: 1rem 0; }
    .qr-area img { width: 220px; height: 220px; border-radius: 12px; border: 1px solid var(--line); }
    .qr-hint { margin-top: .75rem; font-size: .8rem; color: var(--muted); line-height: 1.5; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: white;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .success-banner {
      display: none; align-items: center; gap: .6rem;
      padding: .75rem 1rem; border-radius: var(--radius-lg);
      background: var(--green-soft); border: 1px solid var(--green);
      color: var(--green); font-size: .875rem; font-weight: 700; margin-top: 1rem;
    }
    .success-banner.show { display: flex; }
  </style>
</head>
<body>

{% set active_page = 'settings' %}
{% include "_nav.html" %}

<div class="page">
  <h1>Settings</h1>

  <div class="section-card">
    <div class="section-title">WhatsApp Connection</div>

    <div class="status-row">
      <div class="status-dot loading" id="status-dot"></div>
      <div>
        <div class="status-label" id="status-label">Checking…</div>
        <div class="status-sub" id="status-sub"></div>
      </div>
    </div>

    <div id="qr-area" class="qr-area" style="display:none">
      <img id="qr-img" src="" alt="WhatsApp QR code">
      <div class="qr-hint">
        Open WhatsApp on your phone &rarr; <strong>Linked Devices</strong> &rarr; <strong>Link a Device</strong><br>
        then scan this code. It refreshes automatically.
      </div>
    </div>

    <div class="success-banner" id="success-banner">
      ✓ WhatsApp connected successfully!
    </div>

    <div style="margin-top:1.25rem;display:flex;gap:.75rem;flex-wrap:wrap">
      <button class="btn btn-primary" id="reconnect-btn" onclick="startReconnect()">
        Reconnect WhatsApp
      </button>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title">Ticket-Raising Groups</div>
    <div id="ticket-groups-list" style="font-size:.875rem;color:var(--muted)">Loading&hellip;</div>
    <div id="groups-warning" style="display:none;margin-top:.5rem;font-size:.8rem;color:var(--muted)"></div>
    <div id="ticket-groups-add" style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap">
      <select id="new-group-select" style="display:none;flex:1;min-width:220px;padding:.5rem .75rem;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);color:var(--text)"></select>
      <input id="new-group-id" placeholder="120363XXXXXXXXXX@g.us"
        style="flex:1;min-width:220px;padding:.5rem .75rem;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);color:var(--text)">
      <button class="btn btn-primary" onclick="addTicketGroup()">Add Group</button>
    </div>
    <div id="ticket-groups-msg" style="margin-top:.75rem;font-size:.85rem"></div>
  </div>
</div>

<script>
const CONNECTED_STATUSES = ['WORKING', 'CONNECTED', 'READY', 'AUTHENTICATED'];
let qrPollInterval = null;

(function() {
  const el = document.getElementById('nav-avatar');
  if (el) el.textContent = {{ username | tojson }}.slice(0, 2).toUpperCase();
})();

async function checkStatus() {
  try {
    const data = await fetch('/api/settings/whatsapp-status').then(r => r.json());
    setStatusDisplay(data.status);
  } catch(e) {
    setStatusDisplay('ERROR');
  }
}

function setStatusDisplay(status) {
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  const sub = document.getElementById('status-sub');

  dot.className = 'status-dot';
  if (CONNECTED_STATUSES.includes((status || '').toUpperCase())) {
    dot.classList.add('connected');
    label.textContent = 'Connected';
    sub.textContent = 'WhatsApp is active and receiving messages.';
    stopQrPoll();
    document.getElementById('qr-area').style.display = 'none';
  } else if (status === 'NOT_FOUND' || status === 'ERROR') {
    dot.classList.add('disconnected');
    label.textContent = 'Session not found';
    sub.textContent = 'OpenWA session could not be located.';
  } else {
    dot.classList.add('disconnected');
    label.textContent = 'Disconnected';
    sub.textContent = `Status: ${status || 'unknown'}`;
  }
}

async function startReconnect() {
  const btn = document.getElementById('reconnect-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Starting…';

  try {
    await fetch('/api/settings/whatsapp-reconnect', { method: 'POST' });
  } catch(e) {}

  document.getElementById('qr-area').style.display = 'block';
  document.getElementById('success-banner').classList.remove('show');
  startQrPoll();

  btn.disabled = false;
  btn.textContent = 'Reconnect WhatsApp';
}

function startQrPoll() {
  stopQrPoll();
  pollQr();
  qrPollInterval = setInterval(pollQr, 3000);
}

function stopQrPoll() {
  if (qrPollInterval) { clearInterval(qrPollInterval); qrPollInterval = null; }
}

async function pollQr() {
  try {
    const data = await fetch('/api/settings/whatsapp-qr').then(r => r.json());
    const status = (data.status || '').toUpperCase();

    if (CONNECTED_STATUSES.includes(status)) {
      stopQrPoll();
      document.getElementById('qr-area').style.display = 'none';
      document.getElementById('success-banner').classList.add('show');
      setStatusDisplay(status);
      return;
    }

    if (data.qrCode) {
      document.getElementById('qr-img').src = data.qrCode;
      document.getElementById('qr-area').style.display = 'block';
      document.querySelector('.qr-hint').textContent =
        'Open WhatsApp → Linked Devices → Link a Device, then scan this code.';
      return;
    }

    // QR not ready yet — show transitional status
    document.getElementById('qr-area').style.display = 'block';
    document.getElementById('qr-img').removeAttribute('src');
    document.querySelector('.qr-hint').textContent =
      status ? `Session is ${status.toLowerCase()} — waiting for QR code…` : 'Starting session…';
  } catch(e) {
    document.getElementById('qr-area').style.display = 'block';
    document.getElementById('qr-img').removeAttribute('src');
    document.querySelector('.qr-hint').textContent = 'Error checking status: ' + e.message + ' — retrying…';
  }
}

let whatsappGroupsList = null; // [{id, name}, ...] or null if live fetch unavailable
let whatsappGroupsLookup = {}; // {id: name}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = String(s);
  return div.innerHTML;
}

async function loadWhatsappGroups() {
  try {
    const data = await fetch('/api/settings/whatsapp-groups').then(r => r.json());
    whatsappGroupsList = data.groups === null ? null : data.groups;
  } catch(e) {
    whatsappGroupsList = null;
  }
  whatsappGroupsLookup = {};
  (whatsappGroupsList || []).forEach(g => { whatsappGroupsLookup[g.id] = g.name; });
}

function renderGroupItem(gid) {
  const name = whatsappGroupsLookup[gid];
  if (name) {
    return `<li style="margin-bottom:.35rem">${escapeHtml(name)}<div style="font-size:.75rem;color:var(--muted)">${escapeHtml(gid)}</div></li>`;
  }
  return `<li style="margin-bottom:.35rem">${escapeHtml(gid)}</li>`;
}

function renderAddGroupControl(allowedGroups) {
  const select = document.getElementById('new-group-select');
  const input = document.getElementById('new-group-id');
  const warning = document.getElementById('groups-warning');

  if (whatsappGroupsList === null) {
    select.style.display = 'none';
    input.style.display = '';
    input.placeholder = '120363XXXXXXXXXX@g.us';
    warning.style.display = '';
    warning.textContent = "Couldn't load live group list — enter the group ID manually.";
    return;
  }

  warning.style.display = 'none';
  const allowedSet = new Set(allowedGroups || []);
  const available = whatsappGroupsList
    .filter(g => !allowedSet.has(g.id))
    .sort((a, b) => a.name.localeCompare(b.name));

  if (available.length === 0) {
    select.innerHTML = '<option value="">No groups available to add</option>';
    select.disabled = true;
    select.style.display = '';
    input.style.display = '';
    input.placeholder = 'Or enter a group ID manually';
    return;
  }

  select.disabled = false;
  select.innerHTML = '<option value="" disabled selected>Select a group&hellip;</option>' +
    available.map(g => `<option value="${escapeHtml(g.id)}">${escapeHtml(g.name)}</option>`).join('');
  select.style.display = '';
  input.style.display = 'none';
}

async function loadTicketGroups() {
  const el = document.getElementById('ticket-groups-list');
  const addForm = document.getElementById('ticket-groups-add');
  await loadWhatsappGroups();
  try {
    const data = await fetch('/api/settings/ticket-groups').then(r => r.json());
    if (data.allowed_groups === null) {
      el.textContent = 'Unrestricted — any group can raise tickets.';
      if (addForm) addForm.style.display = 'none';
      return;
    }
    if (addForm) addForm.style.display = '';
    const limit = data.tier_limit != null ? ` (limit: ${data.tier_limit})` : '';
    el.innerHTML = data.allowed_groups.length
      ? `<ul style="margin:0;padding-left:1.25rem;list-style:none">${data.allowed_groups.map(renderGroupItem).join('')}</ul>${limit}`
      : `No groups configured yet${limit}`;
    renderAddGroupControl(data.allowed_groups);
  } catch(e) {
    el.textContent = 'Could not load ticket-raising groups.';
  }
}

function getNewGroupValue() {
  const select = document.getElementById('new-group-select');
  const input = document.getElementById('new-group-id');
  if (select.style.display !== 'none') return select.value;
  return input.value.trim();
}

async function addTicketGroup() {
  const input = document.getElementById('new-group-id');
  const msg = document.getElementById('ticket-groups-msg');
  const groupId = getNewGroupValue();
  if (!groupId) return;
  msg.textContent = '';
  try {
    const res = await fetch('/api/settings/ticket-groups/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ group_id: groupId }),
    });
    const data = await res.json();
    if (!res.ok) {
      msg.style.color = 'var(--red)';
      msg.textContent = data.detail || 'Could not add group.';
      return;
    }
    if (data.status === 'limit_reached') {
      msg.style.color = 'var(--amber)';
      const phone = prompt(`You've reached your plan's limit (${data.next_tier_max ?? 'current'} groups). Upgrade for KES ${data.next_tier_amount}? Enter your M-Pesa number to pay:`);
      if (!phone) { msg.textContent = 'Upgrade cancelled.'; return; }
      const upRes = await fetch('/api/settings/ticket-groups/upgrade', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ group_id: groupId, phone }),
      });
      const upData = await upRes.json();
      if (!upRes.ok) {
        msg.textContent = upData.detail || 'Upgrade request failed.';
        return;
      }
      msg.style.color = upData.status === 'pending_exists' ? 'var(--amber)' : 'var(--green)';
      msg.textContent = upData.status === 'pending_exists'
        ? 'An upgrade payment is already in progress — check your phone.'
        : 'STK push sent — enter your M-Pesa PIN to complete the upgrade.';
      return;
    }
    msg.style.color = 'var(--green)';
    msg.textContent = data.added ? 'Group added.' : 'Group already on your list.';
    input.value = '';
    loadTicketGroups();
  } catch(e) {
    msg.style.color = 'var(--red)';
    msg.textContent = 'Request failed.';
  }
}

loadTicketGroups();
checkStatus();
setInterval(checkStatus, 30000);
</script>
</body>
</html>
