<!-- Floating Chat Widget — Ops Assistant -->
<style>
  .cw-fab {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 9998;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--blue, #38bdf8);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(56, 189, 248, 0.38);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .cw-fab:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(56, 189, 248, 0.52);
  }
  .cw-fab svg { pointer-events: none; }

  .cw-panel {
    position: fixed;
    bottom: 4.5rem;
    right: 1.5rem;
    z-index: 9999;
    width: 360px;
    max-width: calc(100vw - 2rem);
    height: 500px;
    max-height: calc(100vh - 6rem);
    background: var(--surface, #101f34);
    border: 1px solid var(--line, rgba(148,163,184,0.18));
    border-radius: var(--radius-xl, 22px);
    box-shadow: var(--shadow, 0 18px 45px rgba(0,0,0,0.28));
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .cw-panel[hidden] {
    display: none !important;
  }
  .cw-panel.cw-animating-in {
    animation: cwSlideIn 0.2s ease forwards;
  }
  @keyframes cwSlideIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }

  .cw-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--line, rgba(148,163,184,0.18));
    flex-shrink: 0;
  }
  .cw-title {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 700;
    font-size: 0.9375rem;
    color: var(--text, #eef6ff);
    letter-spacing: -0.01em;
  }
  .cw-title-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green, #22c55e);
    box-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
  }
  .cw-close-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted, #91a3b8);
    width: 28px;
    height: 28px;
    border-radius: var(--radius-sm, 8px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.14s, color 0.14s;
  }
  .cw-close-btn:hover {
    background: var(--surface-2, #132840);
    color: var(--text, #eef6ff);
  }

  .cw-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.625rem;
    scroll-behavior: smooth;
  }
  .cw-messages::-webkit-scrollbar { width: 4px; }
  .cw-messages::-webkit-scrollbar-track { background: transparent; }
  .cw-messages::-webkit-scrollbar-thumb { background: var(--line, rgba(148,163,184,0.18)); border-radius: 2px; }

  .cw-msg {
    max-width: 82%;
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius-md, 12px);
    font-size: 0.875rem;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .cw-msg-user {
    align-self: flex-end;
    background: var(--blue, #38bdf8);
    color: #07111f;
    border-bottom-right-radius: 4px;
  }
  .cw-msg-bot {
    align-self: flex-start;
    background: var(--surface-2, #132840);
    color: var(--text, #eef6ff);
    border: 1px solid var(--line, rgba(148,163,184,0.18));
    border-bottom-left-radius: 4px;
  }
  .cw-msg-error {
    align-self: flex-start;
    background: var(--red-soft, rgba(239,68,68,0.14));
    color: var(--red, #ef4444);
    border: 1px solid rgba(239, 68, 68, 0.25);
    border-bottom-left-radius: 4px;
  }

  .cw-typing {
    align-self: flex-start;
    background: var(--surface-2, #132840);
    border: 1px solid var(--line, rgba(148,163,184,0.18));
    border-bottom-left-radius: 4px;
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius-md, 12px);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .cw-typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted, #91a3b8);
    display: inline-block;
    animation: cwBounce 1.1s infinite ease-in-out;
  }
  .cw-typing span:nth-child(1) { animation-delay: 0s; }
  .cw-typing span:nth-child(2) { animation-delay: 0.18s; }
  .cw-typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes cwBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .cw-footer {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--line, rgba(148,163,184,0.18));
    flex-shrink: 0;
    background: var(--surface, #101f34);
  }
  .cw-input {
    flex: 1;
    background: var(--surface-2, #132840);
    border: 1px solid var(--line, rgba(148,163,184,0.18));
    border-radius: var(--radius-md, 12px);
    padding: 0.5rem 0.75rem;
    color: var(--text, #eef6ff);
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
  }
  .cw-input::placeholder { color: var(--muted-2, #65758a); }
  .cw-input:focus { border-color: var(--blue, #38bdf8); }
  .cw-send-btn {
    background: var(--blue, #38bdf8);
    border: none;
    border-radius: var(--radius-md, 12px);
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #07111f;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  .cw-send-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(1.05); }
  .cw-send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
</style>

<!-- FAB button -->
<button class="cw-fab" id="cwFab" aria-label="Open Ops Assistant chat" title="Ops Assistant">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<!-- Chat panel -->
<div class="cw-panel" id="cwPanel" hidden>
  <div class="cw-header">
    <div class="cw-title">
      <div class="cw-title-dot"></div>
      Ops Assistant
    </div>
    <button class="cw-close-btn" id="cwCloseBtn" aria-label="Close chat">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="cw-messages" id="cwMessages" role="log" aria-live="polite" aria-label="Chat messages">
    <!-- messages injected here -->
  </div>

  <div class="cw-footer">
    <input
      class="cw-input"
      id="cwInput"
      type="text"
      placeholder="Ask something…"
      maxlength="2000"
      autocomplete="off"
      aria-label="Message input"
    />
    <button class="cw-send-btn" id="cwSendBtn" aria-label="Send message" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function () {
  'use strict';

  const SESSION_KEY = 'cw_history';
  const fab   = document.getElementById('cwFab');
  const panel = document.getElementById('cwPanel');
  const closeBtn = document.getElementById('cwCloseBtn');
  const messagesEl = document.getElementById('cwMessages');
  const input  = document.getElementById('cwInput');
  const sendBtn = document.getElementById('cwSendBtn');

  let isOpen = false;
  let isWaiting = false;
  let historyRendered = false;

  // ── History (sessionStorage) ──────────────────────────────────────────
  var HISTORY_MAX = 50;
  function loadHistory() {
    try {
      return JSON.parse(sessionStorage.getItem(SESSION_KEY) || '[]');
    } catch (_) { return []; }
  }
  function saveHistory(hist) {
    if (hist.length > HISTORY_MAX) hist = hist.slice(-HISTORY_MAX);
    try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(hist)); } catch (_) {}
  }

  let history = loadHistory();

  // ── DOM helpers ───────────────────────────────────────────────────────
  function appendMessage(role, text) {
    const el = document.createElement('div');
    el.className = 'cw-msg cw-msg-' + role;
    el.textContent = text;
    messagesEl.appendChild(el);
    scrollToBottom();
    return el;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'cw-typing';
    el.id = 'cwTyping';
    el.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('cwTyping');
    if (el) el.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderHistory() {
    if (historyRendered) return;
    messagesEl.innerHTML = '';
    history.forEach(function (m) {
      appendMessage(m.role, m.text);
    });
    historyRendered = true;
  }

  // ── Panel open/close ──────────────────────────────────────────────────
  function openPanel() {
    isOpen = true;
    panel.hidden = false;
    panel.classList.add('cw-animating-in');
    panel.addEventListener('animationend', function () {
      panel.classList.remove('cw-animating-in');
    }, { once: true });
    renderHistory();
    scrollToBottom();
    input.focus();
    fab.setAttribute('aria-label', 'Close Ops Assistant chat');
  }

  function closePanel() {
    isOpen = false;
    panel.hidden = true;
    fab.setAttribute('aria-label', 'Open Ops Assistant chat');
  }

  fab.addEventListener('click', function () {
    if (isOpen) { closePanel(); } else { openPanel(); }
  });
  closeBtn.addEventListener('click', closePanel);

  // Close on Escape
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && isOpen) closePanel();
  });

  // ── Input handling ────────────────────────────────────────────────────
  input.addEventListener('input', function () {
    sendBtn.disabled = !input.value.trim() || isWaiting;
  });

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey && !sendBtn.disabled) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  // ── Send ──────────────────────────────────────────────────────────────
  function send() {
    const text = input.value.trim();
    if (!text || isWaiting) return;

    input.value = '';
    sendBtn.disabled = true;
    isWaiting = true;

    // Add user message
    history.push({ role: 'user', text: text });
    saveHistory(history);
    appendMessage('user', text);

    showTyping();

    var controller = new AbortController();
    var timeoutId = setTimeout(function () { controller.abort(); }, 90000);

    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
      signal: controller.signal,
    })
      .then(function (res) {
        if (res.redirected || res.status === 302) {
          throw new Error('Session expired — please reload the page.');
        }
        if (!res.ok) {
          return res.json().catch(function () { return {}; }).then(function (data) {
            throw new Error(data.detail || ('Request failed: ' + res.status));
          });
        }
        return res.json();
      })
      .then(function (data) {
        removeTyping();
        var reply = data.reply || '(empty response)';
        history.push({ role: 'bot', text: reply });
        saveHistory(history);
        appendMessage('bot', reply);
      })
      .catch(function (err) {
        removeTyping();
        var msg = err && err.name === 'AbortError'
          ? 'Request timed out — please try again.'
          : (err && err.message ? err.message : 'Unknown error');
        appendMessage('error', 'Error: ' + msg);
      })
      .finally(function () {
        clearTimeout(timeoutId);
        isWaiting = false;
        sendBtn.disabled = !input.value.trim();
      });
  }
})();
</script>
