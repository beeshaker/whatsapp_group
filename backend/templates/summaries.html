<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summaries — Ops Ticketing</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-soft: #0b1728;
      --surface: #101f34;
      --surface-2: #132840;
      --surface-3: #18324f;
      --line: rgba(148, 163, 184, 0.18);
      --text: #eef6ff;
      --muted: #91a3b8;
      --muted-2: #65758a;
      --blue: #38bdf8;
      --blue-deep: #075985;
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, 0.14);
      --amber: #f59e0b;
      --amber-soft: rgba(245, 158, 11, 0.14);
      --green: #22c55e;
      --green-soft: rgba(34, 197, 94, 0.14);
      --purple: #a855f7;
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(168, 85, 247, 0.14), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button, input { font: inherit; }

    /* ── Nav ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7, 17, 31, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1.5rem;
      height: 52px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 0.9375rem;
      letter-spacing: -0.01em;
      flex-shrink: 0;
    }

    .nav-brand-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--blue) 0%, #7c3aed 100%);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex: 1;
      justify-content: center;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.375rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s, background 0.15s;
    }

    .nav-link:hover { color: var(--text); background: rgba(148, 163, 184, 0.08); }
    .nav-link.active { color: var(--blue); background: rgba(56, 189, 248, 0.1); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.65rem;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 99px;
      font-size: 0.8125rem;
      font-weight: 500;
    }

    .user-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue) 0%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .btn-signout {
      padding: 0.35rem 0.875rem;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-signout:hover { color: var(--red); border-color: rgba(239, 68, 68, 0.4); }

    /* ── Page content ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ── Date picker ── */
    .date-form {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .date-label {
      font-size: 0.8125rem;
      color: var(--muted);
      font-weight: 500;
    }

    .date-input {
      padding: 0.375rem 0.75rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .date-input:focus { border-color: rgba(56, 189, 248, 0.5); }

    .btn-go {
      padding: 0.375rem 1rem;
      background: var(--blue);
      color: #0a1628;
      font-weight: 700;
      font-size: 0.875rem;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-go:hover { opacity: 0.88; }

    /* ── Loading / empty states ── */
    .state-box {
      min-height: 300px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px dashed rgba(148, 163, 184, 0.2);
      border-radius: var(--radius-xl);
      background: rgba(11, 23, 40, 0.55);
      color: var(--muted);
      padding: 28px;
    }

    .state-box strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin-bottom: 6px;
    }

    /* ── Summaries grid ── */
    .summaries-grid {
      display: grid;
      gap: 16px;
    }

    .summary-card {
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(16, 31, 52, 0.86);
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .summary-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      flex-wrap: wrap;
    }

    .summary-group-id {
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .summary-period {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .summary-stats {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .stat-pill.new { background: rgba(14, 165, 233, 0.14); color: #bae6fd; }
    .stat-pill.resolved { background: rgba(148, 163, 184, 0.12); color: #cbd5e1; }
    .stat-pill.open { background: rgba(245, 158, 11, 0.14); color: #fde68a; }

    .summary-card-body {
      padding: 14px 20px 18px;
    }

    .severity-section {
      margin-top: 10px;
    }

    .severity-label {
      font-size: 0.6875rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .severity-bars {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sev-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .sev-chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sev-chip.high { background: var(--red-soft); color: #fecaca; }
    .sev-chip.medium { background: var(--amber-soft); color: #fde68a; }
    .sev-chip.low { background: var(--green-soft); color: #bbf7d0; }

    .period-info {
      font-size: 0.8125rem;
      color: var(--muted-2);
      margin-top: 14px;
    }
  </style>
</head>
<body>

<!-- ── Top nav ── -->
<nav class="nav">
  <a class="nav-brand" href="/">
    <div class="nav-brand-icon">🎫</div>
    Ops Ticketing
  </a>
  <div class="nav-links">
    <a class="nav-link" href="/">📋 Live Queue</a>
    <a class="nav-link" href="/archive">📁 Archive</a>
    {% if role == 'admin' %}
    <a class="nav-link" href="/users">👥 Users</a>
    {% endif %}
    <a class="nav-link active" href="/summaries">📊 Summaries</a>
    <a class="nav-link" href="/admin/profile">👤 Profile</a>
  </div>
  <div class="nav-right">
    <div class="user-pill">
      <div class="user-avatar" id="nav-avatar"></div>
      <span>{{ username }}</span>
    </div>
    <form method="post" action="/logout" style="margin:0">
      <button class="btn-signout" type="submit">Sign out</button>
    </form>
  </div>
</nav>

<!-- ── Page ── -->
<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Summaries</div>
      <div class="page-subtitle" id="page-subtitle">Loading summaries…</div>
    </div>
    <form class="date-form" id="date-form" onsubmit="return handleDateSubmit(event)">
      <label class="date-label" for="date-input">Date:</label>
      <input class="date-input" type="date" id="date-input" name="date"
             value="{{ selected_date }}" max="{{ today }}">
      <button class="btn-go" type="submit">Go</button>
    </form>
  </div>

  <div id="summaries-container">
    <div class="state-box" id="loading-state">
      <div><strong>Loading…</strong>Fetching group summaries.</div>
    </div>
  </div>
</main>

<script>
const INITIAL_DATE = {{ selected_date | tojson }};

// Set nav avatar
(function() {
  const el = document.getElementById('nav-avatar');
  const username = {{ username | tojson }};
  if (el && username) el.textContent = username.slice(0, 2).toUpperCase();
})();

function handleDateSubmit(e) {
  e.preventDefault();
  const date = document.getElementById('date-input').value;
  const url = date ? `/summaries?date=${encodeURIComponent(date)}` : '/summaries';
  window.location.href = url;
  return false;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function renderSummaries(summaries) {
  const container = document.getElementById('summaries-container');
  const subtitle = document.getElementById('page-subtitle');

  if (!summaries || summaries.length === 0) {
    subtitle.textContent = 'No summaries for this date.';
    container.innerHTML = `
      <div class="state-box">
        <div><strong>No summaries found</strong>No group activity recorded for this date.</div>
      </div>`;
    return;
  }

  subtitle.textContent = `${summaries.length} group${summaries.length !== 1 ? 's' : ''} · ${summaries[0].period_label || ''}`;

  const html = summaries.map(s => {
    const backlog = s.open_backlog || {};
    const high = backlog.high || 0;
    const medium = backlog.medium || 0;
    const low = backlog.low || 0;

    return `
      <div class="summary-card">
        <div class="summary-card-head">
          <div>
            <div class="summary-group-id">${esc(s.group_id)}</div>
            <div class="summary-period">${esc(s.period_label || '')}</div>
          </div>
          <div class="summary-stats">
            <span class="stat-pill new">+${esc(s.new_count)} new</span>
            <span class="stat-pill resolved">✓ ${esc(s.resolved_count)} resolved</span>
            <span class="stat-pill open">${esc(s.still_open_count)} still open</span>
          </div>
        </div>
        <div class="summary-card-body">
          <div class="severity-section">
            <div class="severity-label">Open backlog by severity</div>
            <div class="severity-bars">
              <span class="sev-chip high"><span class="dot" style="background:#ef4444"></span>High: ${esc(high)}</span>
              <span class="sev-chip medium"><span class="dot" style="background:#f59e0b"></span>Medium: ${esc(medium)}</span>
              <span class="sev-chip low"><span class="dot" style="background:#22c55e"></span>Low: ${esc(low)}</span>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  container.innerHTML = `<div class="summaries-grid">${html}</div>`;
}

async function loadSummaries() {
  const date = INITIAL_DATE;
  const url = date ? `/api/summaries?date=${encodeURIComponent(date)}` : '/api/summaries';
  try {
    const res = await fetch(url);
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.detail || `HTTP ${res.status}`);
    }
    const summaries = await res.json();
    renderSummaries(summaries);
  } catch (err) {
    const container = document.getElementById('summaries-container');
    const subtitle = document.getElementById('page-subtitle');
    subtitle.textContent = 'Failed to load summaries.';
    container.innerHTML = `
      <div class="state-box">
        <div><strong>Error loading summaries</strong>${esc(err.message)}</div>
      </div>`;
  }
}

loadSummaries();
</script>
</body>
</html>
