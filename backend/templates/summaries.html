<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summaries — Ops Ticketing</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    /* Page-local styles: page shell, date-picker form, and the summary-list
       rendering (cards, stat pills, severity chips) generated by
       renderSummaries() below. Shared tokens / nav / buttons / inputs come
       from base.css. */

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ── Date picker ── */
    .date-form {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .date-label {
      font-size: 0.8125rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Loading / empty states ── */
    .state-box {
      min-height: 300px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface-2);
      color: var(--muted);
      padding: 28px;
    }

    .state-box strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin-bottom: 6px;
    }

    /* ── Summaries grid ── */
    .summaries-grid {
      display: grid;
      gap: 16px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .summary-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .summary-group-id {
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .summary-period {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .summary-stats {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Daily-summary stat pills (new / resolved / still-open counts) — a
       different domain from the ticket-status badges in base.css, so kept
       page-local. Colors reference the shared design tokens. */
    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .stat-pill.new { background: var(--teal-soft); color: var(--teal-deep); }
    .stat-pill.resolved { background: var(--green-soft); color: var(--green); }
    .stat-pill.open { background: var(--amber-soft); color: var(--amber); }

    .summary-card-body {
      padding: 14px 20px 18px;
    }

    .severity-section {
      margin-top: 10px;
    }

    .severity-label {
      font-size: 0.6875rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .severity-bars {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sev-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .sev-chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sev-chip.urgent { background: var(--urgent-soft); color: var(--urgent); }
    .sev-chip.high { background: var(--red-soft); color: var(--red); }
    .sev-chip.medium { background: var(--amber-soft); color: var(--amber); }
    .sev-chip.low { background: var(--green-soft); color: var(--green); }

    .period-info {
      font-size: 0.8125rem;
      color: var(--muted-2);
      margin-top: 14px;
    }
  </style>
</head>
<body>

{% set active_page = 'summaries' %}
{% include "_nav.html" %}

<!-- ── Page ── -->
<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Summaries</div>
      <div class="page-subtitle" id="page-subtitle">Loading summaries…</div>
    </div>
    <form class="date-form" id="date-form" onsubmit="return handleDateSubmit(event)">
      <label class="date-label" for="date-input">Date:</label>
      <input type="date" id="date-input" name="date"
             value="{{ selected_date }}" max="{{ today }}">
      <button class="btn btn-primary" type="submit">Go</button>
    </form>
  </div>

  <div id="summaries-container">
    <div class="state-box" id="loading-state">
      <div><strong>Loading…</strong>Fetching group summaries.</div>
    </div>
  </div>
</main>

<script>
const INITIAL_DATE = {{ selected_date | tojson }};

// Set nav avatar
(function() {
  const el = document.getElementById('nav-avatar');
  const username = {{ username | tojson }};
  if (el && username) el.textContent = username.slice(0, 2).toUpperCase();
})();

function handleDateSubmit(e) {
  e.preventDefault();
  const date = document.getElementById('date-input').value;
  const url = date ? `/summaries?date=${encodeURIComponent(date)}` : '/summaries';
  window.location.href = url;
  return false;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function renderSummaries(summaries) {
  const container = document.getElementById('summaries-container');
  const subtitle = document.getElementById('page-subtitle');

  if (!summaries || summaries.length === 0) {
    subtitle.textContent = 'No summaries for this date.';
    container.innerHTML = `
      <div class="state-box">
        <div><strong>No summaries found</strong>No group activity recorded for this date.</div>
      </div>`;
    return;
  }

  subtitle.textContent = `${summaries.length} group${summaries.length !== 1 ? 's' : ''} · ${summaries[0].period_label || ''}`;

  const html = summaries.map(s => {
    const backlog = s.open_backlog || {};
    const urgent = backlog.urgent || 0;
    const high = backlog.high || 0;
    const medium = backlog.medium || 0;
    const low = backlog.low || 0;

    return `
      <div class="summary-card">
        <div class="summary-card-head">
          <div>
            <div class="summary-group-id">${esc(s.group_id)}</div>
            <div class="summary-period">${esc(s.period_label || '')}</div>
          </div>
          <div class="summary-stats">
            <span class="stat-pill new">+${esc(s.new_count)} new</span>
            <span class="stat-pill resolved">✓ ${esc(s.resolved_count)} resolved</span>
            <span class="stat-pill open">${esc(s.still_open_count)} still open</span>
          </div>
        </div>
        <div class="summary-card-body">
          <div class="severity-section">
            <div class="severity-label">Open backlog by severity</div>
            <div class="severity-bars">
              <span class="sev-chip urgent"><span class="dot" style="background:var(--urgent)"></span>Urgent: ${esc(urgent)}</span>
              <span class="sev-chip high"><span class="dot" style="background:var(--red)"></span>High: ${esc(high)}</span>
              <span class="sev-chip medium"><span class="dot" style="background:var(--amber)"></span>Medium: ${esc(medium)}</span>
              <span class="sev-chip low"><span class="dot" style="background:var(--green)"></span>Low: ${esc(low)}</span>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  container.innerHTML = `<div class="summaries-grid">${html}</div>`;
}

async function loadSummaries() {
  const date = INITIAL_DATE;
  const url = date ? `/api/summaries?date=${encodeURIComponent(date)}` : '/api/summaries';
  try {
    const res = await fetch(url);
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.detail || `HTTP ${res.status}`);
    }
    const summaries = await res.json();
    renderSummaries(summaries);
  } catch (err) {
    const container = document.getElementById('summaries-container');
    const subtitle = document.getElementById('page-subtitle');
    subtitle.textContent = 'Failed to load summaries.';
    container.innerHTML = `
      <div class="state-box">
        <div><strong>Error loading summaries</strong>${esc(err.message)}</div>
      </div>`;
  }
}

loadSummaries();
</script>
{% include "_chat_widget.html" %}
</body>
</html>
