<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Management — Ops Ticketing</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    /* Page-local styles: page shell, add-category form, category table cells,
       protected badge, and this page's own remap-and-delete modal. Shared
       tokens / nav / buttons / inputs / data-table come from base.css. */

    /* ── Page ── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .page-title {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.75rem;
    }

    /* ── Add form ── */
    .add-form {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .field-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-add {
      padding: 0.47rem 1.1rem;
      background: var(--teal);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      align-self: flex-end;
      margin-top: 1.05rem;
    }

    .btn-add:hover:not(:disabled) { opacity: 0.88; }
    .btn-add:disabled { opacity: 0.45; cursor: not-allowed; }

    .inline-error {
      font-size: 0.78rem;
      color: var(--red);
      margin-top: 0.25rem;
    }

    /* ── Table ── */
    .table-wrap {
      /* .data-table (base.css) provides the surface/border/radius on the
         <table> itself; this div is kept as a structural wrapper only,
         matching the pattern used on other data-table pages. */
    }

    .slug-cell { font-family: monospace; color: var(--muted); font-size: 0.8125rem; }
    .count-cell { color: var(--muted); }

    .btn-delete {
      padding: 0.3rem 0.75rem;
      background: transparent;
      border: 1px solid var(--red-soft);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: 0.8125rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-delete:hover { background: var(--red-soft); }

    /* Lock-icon badge shown on protected categories (cannot be deleted).
       Domain-specific to this page — not one of base.css's ticket-status
       .badge-* variants, so kept here. */
    .protected-badge {
      font-size: 1rem;
      cursor: default;
      opacity: 0.6;
    }

    /* ── Modal (this page's own remap-and-delete-category modal; separate
       from dashboard.html's #detail-modal-overlay) ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(43, 38, 32, 0.45);
      backdrop-filter: blur(3px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 1.75rem;
      max-width: 420px;
      width: 90%;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .modal-body {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .modal-select {
      /* base.css styles bare <select> (background/border/radius/color); this
         class only adds the layout it needs beyond that default. */
      width: 100%;
      margin-bottom: 1.25rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 0.4rem 0.9rem;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn-confirm-delete {
      padding: 0.4rem 0.9rem;
      background: var(--red);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-confirm-delete:hover { opacity: 0.88; }

    .modal-error {
      font-size: 0.78rem;
      color: var(--red);
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>

{% set active_page = 'super_admin_categories' %}
{% include "_nav.html" %}

<div class="page">
  <div class="page-title">Category Management</div>

  <div class="add-form">
    <div class="field-group">
      <label class="field-label" for="new-slug">Slug</label>
      <input id="new-slug" type="text" placeholder="e.g. pest_control" maxlength="50">
      <div class="inline-error" id="slug-error"></div>
    </div>
    <div class="field-group">
      <label class="field-label" for="new-label">Label</label>
      <input id="new-label" type="text" placeholder="e.g. Pest Control" maxlength="100">
      <div class="inline-error" id="label-error"></div>
    </div>
    <button class="btn-add" id="btn-add" onclick="addCategory()">+ Add Category</button>
  </div>

  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Slug</th>
          <th>Label</th>
          <th>Incidents</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="cat-tbody">
        {% for cat in categories %}
        <tr id="row-{{ cat.slug }}">
          <td class="slug-cell">{{ cat.slug }}</td>
          <td>{{ cat.label }}</td>
          <td class="count-cell">{{ cat.incident_count }}</td>
          <td>
            {% if cat.is_protected %}
              <span class="protected-badge" title="Protected — cannot be deleted">🔒</span>
            {% else %}
              <button class="btn-delete" data-slug="{{ cat.slug }}" data-label="{{ cat.label }}">Delete</button>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<!-- Remap modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Delete Category</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-error" id="modal-error"></div>
    <select class="modal-select" id="modal-remap"></select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm-delete" id="btn-confirm" onclick="confirmDelete()">Confirm Remap &amp; Delete</button>
    </div>
  </div>
</div>

<script>
  const username = {{ username | tojson }};
  const el = document.getElementById('nav-avatar');
  if (el && username) el.textContent = username.slice(0, 2).toUpperCase();

  let _deleteSlug = null;
  let _allCategories = {{ categories | tojson }};

  document.getElementById('cat-tbody').addEventListener('click', function(e) {
    const btn = e.target.closest('.btn-delete');
    if (!btn) return;
    const slug = btn.dataset.slug;
    const label = btn.dataset.label;
    if (slug && label) startDelete(slug, label);
  });

  async function addCategory() {
    const slugEl = document.getElementById('new-slug');
    const labelEl = document.getElementById('new-label');
    const slugErr = document.getElementById('slug-error');
    const labelErr = document.getElementById('label-error');
    slugErr.textContent = '';
    labelErr.textContent = '';

    const slug = slugEl.value.trim();
    const label = labelEl.value.trim();

    if (!slug) { slugErr.textContent = 'Slug is required'; return; }
    if (!/^[a-z0-9_]+$/.test(slug) || slug.length > 50) {
      slugErr.textContent = 'Slug must match ^[a-z0-9_]+$ and be max 50 chars';
      return;
    }
    if (!label) { labelErr.textContent = 'Label is required'; return; }

    const btn = document.getElementById('btn-add');
    btn.disabled = true;

    const resp = await fetch('/api/super-admin/categories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, label }),
    });

    btn.disabled = false;

    if (resp.status === 409) {
      slugErr.textContent = 'Slug already exists';
      return;
    }
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      slugErr.textContent = err.detail || 'Error creating category';
      return;
    }

    const cat = await resp.json();
    _allCategories.push(cat);
    addRow(cat);
    slugEl.value = '';
    labelEl.value = '';
  }

  function addRow(cat) {
    const tbody = document.getElementById('cat-tbody');
    const tr = document.createElement('tr');
    tr.id = `row-${cat.slug}`;
    tr.innerHTML = `
    <td class="slug-cell">${escHtml(cat.slug)}</td>
    <td>${escHtml(cat.label)}</td>
    <td class="count-cell">0</td>
    <td></td>
  `;
    const btn = document.createElement('button');
    btn.className = 'btn-delete';
    btn.dataset.slug = cat.slug;
    btn.dataset.label = cat.label;
    btn.textContent = 'Delete';
    tr.querySelector('td:last-child').appendChild(btn);
    tbody.appendChild(tr);
  }

  async function startDelete(slug, label) {
    _deleteSlug = slug;
    document.getElementById('modal-error').textContent = '';

    const resp = await fetch(`/api/super-admin/categories/${encodeURIComponent(slug)}/usage`);
    if (!resp.ok) { alert('Failed to fetch usage'); return; }
    const data = await resp.json();

    if (data.incident_count === 0) {
      if (!confirm(`Delete category "${label}"?`)) return;
      await doDelete(slug, null);
      return;
    }

    document.getElementById('modal-body').textContent =
      `${data.incident_count} incident(s) use "${label}". Remap them to:`;

    const sel = document.getElementById('modal-remap');
    sel.innerHTML = '';
    _allCategories.forEach(c => {
      if (c.slug === slug) return;
      const opt = document.createElement('option');
      opt.value = c.slug;
      opt.textContent = `${c.label} (${c.slug})`;
      sel.appendChild(opt);
    });

    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    _deleteSlug = null;
  }

  async function confirmDelete() {
    const remapTo = document.getElementById('modal-remap').value;
    await doDelete(_deleteSlug, remapTo);
  }

  async function doDelete(slug, remapTo) {
    const body = remapTo ? { remap_to: remapTo } : {};
    const resp = await fetch(`/api/super-admin/categories/${encodeURIComponent(slug)}/delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (resp.status === 204) {
      const row = document.getElementById(`row-${slug}`);
      if (row) row.remove();
      _allCategories = _allCategories.filter(c => c.slug !== slug);
      closeModal();
      return;
    }

    const err = await resp.json().catch(() => ({}));
    const msg = typeof err.detail === 'object' ? err.detail.message : (err.detail || 'Delete failed');

    if (document.getElementById('modal').classList.contains('open')) {
      document.getElementById('modal-error').textContent = msg;
    } else {
      alert(msg);
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
