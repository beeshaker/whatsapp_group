<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Ops Ticketing</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2.25rem 2.25rem;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--blue) 0%, #7c3aed 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.2;
    }

    .brand-sub {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      width: 100%;
      font-weight: 700;
      font-size: 0.9375rem;
      border: none;
      border-radius: var(--radius-md);
      padding: 0.7rem 1rem;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }

    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:active { transform: scale(0.985); }

    .error-banner {
      background: var(--red-soft);
      border: 1px solid rgba(220, 38, 38, 0.25);
      color: var(--red);
      border-radius: var(--radius-md);
      padding: 0.6rem 0.875rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🎫</div>
      <div>
        <div class="brand-name">Ops Ticketing</div>
        <div class="brand-sub">Property Operations</div>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue.</p>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          autofocus
          required
          placeholder="e.g. alice"
        >
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        >
      </div>
      <button class="btn-primary" type="submit">Sign in →</button>
    </form>
  </div>
</body>
</html>
