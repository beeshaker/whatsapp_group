<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Ops Ticketing</title>
  <style>
    :root {
      --bg: #07111f;
      --surface: #101f34;
      --surface-2: #132840;
      --line: rgba(148, 163, 184, 0.18);
      --text: #eef6ff;
      --muted: #91a3b8;
      --blue: #38bdf8;
      --blue-deep: #075985;
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, 0.14);
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.20), transparent 40%),
        radial-gradient(circle at 80% 75%, rgba(168, 85, 247, 0.18), transparent 38%),
        radial-gradient(circle at 50% 100%, rgba(56, 189, 248, 0.10), transparent 50%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    button, input { font: inherit; }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2.25rem 2.25rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--blue) 0%, #7c3aed 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.2;
    }

    .brand-sub {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="password"] {
      background: var(--surface-2, #132840);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      color: var(--text);
      padding: 0.65rem 0.875rem;
      font-size: 0.9375rem;
      transition: border-color 0.15s;
      outline: none;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--blue) 0%, #0ea5e9 100%);
      color: #0a1628;
      font-weight: 700;
      font-size: 0.9375rem;
      border: none;
      border-radius: var(--radius-md);
      padding: 0.7rem 1rem;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }

    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:active { transform: scale(0.985); }

    .error-banner {
      background: var(--red-soft);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      border-radius: var(--radius-md);
      padding: 0.6rem 0.875rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🎫</div>
      <div>
        <div class="brand-name">Ops Ticketing</div>
        <div class="brand-sub">Property Operations</div>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue.</p>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          autofocus
          required
          placeholder="e.g. alice"
        >
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        >
      </div>
      <button class="btn-primary" type="submit">Sign in →</button>
    </form>
  </div>
</body>
</html>
